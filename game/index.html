<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AVIAMASTERS DEMO</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="game">

   <h1>✈ AVIAMASTERS DEMO</h1>

<div class="game-area">

    <!-- ☀️ солнце / ☁️ облака добавляются через CSS -->

    <!-- SVG линия полёта -->
    <svg id="flightPath">
        <polyline id="line" fill="none"></polyline>
    </svg>

    <!-- острова -->
    <div class="island island1"></div>
    <div class="island island2"></div>
    <div class="island island3"></div>
    <div class="island island4"></div>
    <div class="island island5"></div>

    <!-- точки множителей -->
    <div class="route">
        <div class="point p1">1.2x</div>
        <div class="point p2">2.5x</div>
        <div class="point p3">5x</div>
        <div class="point p4">10x</div>
    </div>

    <!-- самолёт -->
    <div id="plane">
        <img src="plane.svg">
    </div>

    <!-- множитель -->
    <div id="multiplier">1.00x</div>

</div>

<div class="panel">

        <div class="stats">
            <div>💰 Баланс: <span id="balance">1000</span></div>

            <div>
                Ставка:
                <input id="bet" type="number" value="100">
            </div>
        </div>

        <button id="start">Взлёт</button>
        <button id="take">Забрать</button>

        <div id="message"></div>

        <div id="history"></div>

    </div>

</div>

<script src="game.js"></script>

</body>
</html>
