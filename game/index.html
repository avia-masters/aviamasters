<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AVIAMASTERS Demo</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="game">


<h1>✈ AVIAMASTERS DEMO</h1>


<div class="sky"><div class="route">

<div class="point p1">1.20x</div>

<div class="point p2">2.50x</div>

<div class="point p3">5.00x</div>

<div class="point p4">10x</div>

</div>
  


<svg id="flightPath">

<polyline 
id="line"
points="0,300"
fill="none"
stroke="#00ffcc"
stroke-width="5"
/>

</svg>


<div id="plane">

<img src="plane.svg">

</div>


<div id="multiplier">
1.00x
</div>


</div>



<div class="panel">


<div class="stats">

<div>
💰 Баланс:
<span id="balance">
1000
</span>
</div>


<div>

Ставка:

<input id="bet"
type="number"
value="100">

</div>

</div>



<button id="start">
Взлёт
</button>


<button id="take">
Забрать
</button>


</div>



<div id="message"></div>
  <div id="history">

</div>


</div>



<script src="game.js"></script>


</body>

</html>
