<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">

<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0%" stop-color="#050B1A"/>
    <stop offset="100%" stop-color="#0057FF"/>
  </linearGradient>

  <filter id="glow">
    <feGaussianBlur stdDeviation="6" result="blur"/>
    <feMerge>
      <feMergeNode in="blur"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
</defs>

<!-- фон -->
<rect width="512" height="512" rx="120" fill="url(#bg)"/>

<!-- круг радара -->
<circle cx="256" cy="245" r="150"
stroke="#00E5FF"
stroke-width="8"
fill="none"
opacity="0.45"/>

<circle cx="256" cy="245" r="105"
stroke="#00E5FF"
stroke-width="4"
fill="none"
opacity="0.25"/>


<!-- самолёт -->
<path d="
M256 95
L285 220
L410 270
L410 310
L285 290
L265 405
L247 405
L227 290
L102 310
L102 270
L227 220
Z"
fill="#FFFFFF"
filter="url(#glow)"/>


<!-- крылья акцент -->
<path d="
M170 250
L342 250
L310 285
L202 285
Z"
fill="#00E5FF"
opacity="0.9"/>


<!-- название -->
<text x="256"
y="455"
text-anchor="middle"
font-family="Arial, sans-serif"
font-size="62"
font-weight="900"
fill="#FFFFFF">
AM
</text>

<!-- точка сообщества -->
<circle cx="420" cy="110" r="18" fill="#00FF9D"/>
<circle cx="420" cy="110" r="30"
stroke="#00FF9D"
stroke-width="3"
fill="none"
opacity="0.5"/>

</svg>
